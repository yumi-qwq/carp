name: Build Carp

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'fabric.mod.json'
      - 'settings.gradle'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (e.g., beta1, rc2)'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'microsoft'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: ./gradlew.bat build --no-daemon
      shell: cmd

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Carp-Build
        path: build/libs/*.jar
        if-no-files-found: error

    - name: Upload sources
      uses: actions/upload-artifact@v4
      with:
        name: Carp-Sources
        path: build/libs/*-sources.jar
        if-no-files-found: ignore
